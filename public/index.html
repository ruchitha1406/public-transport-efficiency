<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bus Live Tracking</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
/* Animated light background */
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  height: 100vh;
  overflow: hidden;

  background: linear-gradient(-45deg, #a1c4fd, #c2e9fb, #d4fc79, #96e6a1);
  background-size: 400% 400%;
  animation: gradientMove 12s ease infinite;
}

@keyframes gradientMove {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

/* Layout */
.container {
  display: flex;
  height: 100vh;
  gap: 10px;
  padding: 10px;
}

/* Sidebar (Glass UI) */
.sidebar {
  width: 260px;
  background: rgba(255, 255, 255, 0.85);
  backdrop-filter: blur(15px);
  border-radius: 20px;
  padding: 20px;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  box-shadow: 0 10px 40px rgba(0,0,0,0.15);
}

/* Title */
.sidebar h2 {
  margin: 0;
  color: #1e293b;
}

.sidebar p {
  color: #475569;
  margin-bottom: 20px;
}

/* Controls layout */
.controls-wrapper {
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
}

/* Buttons */
button {
  width: 48px;
  height: 48px;
  border: none;
  border-radius: 14px;
  background: white;
  cursor: pointer;
  font-size: 18px;
  box-shadow: 0 5px 15px rgba(0,0,0,0.1);
  transition: 0.25s;
}

button:hover {
  transform: scale(1.1);
  background: #f1f5f9;
}

/* Arrow keys */
.arrow-keys {
  display: flex;
  flex-direction: column;
  align-items: center;
}

.arrow-row {
  display: flex;
}

.arrow-row button {
  margin: 4px;
}

/* Zoom controls */
.zoom-controls {
  display: flex;
  flex-direction: column;
}

.zoom-controls button {
  margin: 6px;
}

/* Map container */
.map-container {
  flex: 1;
  display: flex;
  justify-content: center;
  align-items: center;
}

/* Map */
#map {
  width: 100%;
  height: 100%;
  border-radius: 20px;
  box-shadow: 0 10px 40px rgba(0,0,0,0.2);
}
</style>
</head>

<body>

<div class="container">

  <!-- Sidebar -->
  <div class="sidebar">

    <div>
      <h2>🚌 Bus Tracker</h2>
      <p>Live tracking system</p>
    </div>

    <!-- Controls -->
    <div class="controls-wrapper">

      <!-- Arrow Keys -->
      <div class="arrow-keys">
        <div>
          <button onclick="moveUp()">⬆️</button>
        </div>
        <div class="arrow-row">
          <button onclick="moveLeft()">⬅️</button>
          <button onclick="moveDown()">⬇️</button>
          <button onclick="moveRight()">➡️</button>
        </div>
      </div>

      <!-- Zoom + Focus -->
      <div class="zoom-controls">
        <button onclick="zoomIn()">➕</button>
        <button onclick="zoomOut()">➖</button>
        <button onclick="focusBus()">📍</button>
      </div>

    </div>

  </div>

  <!-- Map -->
  <div class="map-container">
    <div id="map"></div>
  </div>

</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
let map, marker, path = [], polyline;

async function initMap() {
  const res = await fetch('/location');
  const data = await res.json();

  const lat = data.lat || 12.9716;
  const lon = data.lon || 77.5946;

  map = L.map('map', { zoomControl: false }).setView([lat, lon], 18);

  L.tileLayer(
    'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}'
  ).addTo(map);

  const busIcon = L.icon({
    iconUrl: 'https://cdn-icons-png.flaticon.com/512/3448/3448339.png',
    iconSize: [40, 40]
  });

  marker = L.marker([lat, lon], { icon: busIcon }).addTo(map);

  path.push([lat, lon]);
  polyline = L.polyline(path, { color: 'red', weight: 4 }).addTo(map);
}

function updateBusLocation(lat, lon) {
  if (!lat || !lon) return;

  marker.setLatLng([lat, lon]);
  path.push([lat, lon]);
  polyline.setLatLngs(path);
}

setInterval(async () => {
  const res = await fetch('/location');
  const data = await res.json();
  updateBusLocation(data.lat, data.lon);
}, 2000);

function zoomIn() { map.zoomIn(); }
function zoomOut() { map.zoomOut(); }

function focusBus() {
  map.setView(marker.getLatLng(), 18);
}

function moveUp() { map.panBy([0, -100]); }
function moveDown() { map.panBy([0, 100]); }
function moveLeft() { map.panBy([-100, 0]); }
function moveRight() { map.panBy([100, 0]); }

initMap();
</script>

</body>
</html>
