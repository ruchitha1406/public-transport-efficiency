<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bus GPS Sender</title>

<style>
/* Light animated gradient background */
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  overflow: hidden;

  background: linear-gradient(-45deg, #a1c4fd, #c2e9fb, #d4fc79, #96e6a1);
  background-size: 400% 400%;
  animation: gradientMove 10s ease infinite;
}

@keyframes gradientMove {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

/* Floating blobs */
body::before, body::after {
  content: "";
  position: absolute;
  width: 250px;
  height: 250px;
  border-radius: 50%;
  filter: blur(70px);
  opacity: 0.5;
  animation: float 10s infinite ease-in-out;
}

body::before {
  background: #60a5fa;
  top: 10%;
  left: 10%;
}

body::after {
  background: #34d399;
  bottom: 10%;
  right: 10%;
  animation-delay: 4s;
}

@keyframes float {
  0%,100% { transform: translateY(0px); }
  50% { transform: translateY(-30px); }
}

/* Card */
.container {
  width: 90%;
  max-width: 380px;
  background: rgba(255, 255, 255, 0.85);
  backdrop-filter: blur(20px);
  border-radius: 20px;
  padding: 18px;
  box-shadow: 0 10px 40px rgba(0,0,0,0.2);
  text-align: center;
  z-index: 1;
  animation: fadeIn 1s ease;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(20px);}
  to { opacity: 1; transform: translateY(0);}
}

/* Image container fix */
.banner {
  width: 100%;
  height: 160px;
  border-radius: 15px;
  object-fit: cover;
  object-position: center;
  display: block;
  margin-bottom: 12px;
}

/* Title */
h2 {
  margin: 10px 0;
  color: #1e293b;
}

/* Input */
input {
  width: 90%;
  padding: 12px;
  border-radius: 12px;
  border: 1px solid #ccc;
  outline: none;
  font-size: 16px;
  margin-top: 10px;
}

/* Button */
button {
  margin-top: 20px;
  padding: 12px;
  width: 90%;
  border: none;
  border-radius: 12px;
  font-size: 16px;
  font-weight: bold;
  background: linear-gradient(135deg, #22c55e, #4ade80);
  color: white;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  transform: scale(1.05);
  box-shadow: 0 5px 20px rgba(34,197,94,0.4);
}

/* Status */
#status {
  margin-top: 15px;
  font-size: 14px;
  color: #334155;
}
</style>
</head>

<body>

<div class="container">

  <!-- GMIT Image (FIXED FIT) -->
  <img 
    src="https://www.gmit.ac.in/images/college1.jpg" 
    alt="GMIT Davangere" 
    class="banner"
  >

  <h2>🚌 Bus Tracker - Driver page</h2>

  <input type="text" id="busNumber" placeholder="Enter Bus Number" />

  <button onclick="startTracking()">Start Tracking</button>

  <p id="status"></p>

</div>

<script>
const SERVER_URL = 'https://pseudoviperous-krysta-dampishly.ngrok-free.dev/update-location';
let busNumber = "";

function sendLocation(lat, lon) {
  fetch(SERVER_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ lat, lon, busNumber })
  });
}

function startTracking() {
  busNumber = document.getElementById("busNumber").value;

  if (!busNumber) {
    alert("Enter Bus Number!");
    return;
  }

  document.getElementById("status").innerText = "📡 Tracking Started...";

  navigator.geolocation.watchPosition(
    (position) => {
      const lat = position.coords.latitude;
      const lon = position.coords.longitude;
      sendLocation(lat, lon);
    },
    (err) => alert("GPS Error"),
    { enableHighAccuracy: true }
  );
}
</script>

</body>
</html>
